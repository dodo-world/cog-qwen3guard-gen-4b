name: Push to Replicate

on:
  # Workflow dispatch allows you to manually trigger the workflow from GitHub.com
  # Go to your repo, click "Actions", click "Push to Replicate", click "Run workflow"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  push_to_replicate:
    name: Push to Replicate

    # If your model is large, the default GitHub Actions runner may not
    # have enough disk space. If you need more space you can set up a
    # bigger runner on GitHub.
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - name: Checkout
        uses: actions/checkout@v4

      # This action installs Docker buildx and Cog (and optionally CUDA)
      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}
          cog-version: "v0.17.2"

      - name: Push to Replicate
        run: cog push

      - name: Update deployment
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}
        run: |
          VERSION=$(curl -sf -H "Authorization: Bearer $REPLICATE_API_TOKEN" \
            https://api.replicate.com/v1/models/ditto--ai/qwen3guard-gen-4b/versions \
            | jq -r '.results[0].id')

          curl -sf -X PATCH \
            -H "Authorization: Bearer $REPLICATE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"$VERSION\"}" \
            https://api.replicate.com/v1/deployments/ditto--ai/qwen3guard
